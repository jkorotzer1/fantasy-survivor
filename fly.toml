app = 'fantasy-survivor-red-log-2410'
primary_region = 'ewr'
console_command = '/rails/bin/rails console'

[build]

[[mounts]]
  source = 'sqlite_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
